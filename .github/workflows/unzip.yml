name: Unzip project
on: workflow_dispatch
permissions:
  contents: write
  workflows: write
jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          unzip -o lotto535_final_with_firebase.zip -d . || true
          rm -f lotto535_final_with_firebase.zip
          if [ -d "lotto535_app_final" ]; then
            cp -r lotto535_app_final/* . 2>/dev/null || true
            cp -r lotto535_app_final/.github . 2>/dev/null || true
            rm -rf lotto535_app_final
          fi
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add .
          git commit -m "auto unzip" || echo "no change"
          git push origin main
